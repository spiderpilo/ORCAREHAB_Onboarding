<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORCA Rehab — HR &amp; Payroll</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="login-view" class="screen">
      <form id="login-form" class="login-card">
        <p class="eyebrow">ORCA REHAB</p>
        <h1>HR &amp; Payroll Login</h1>
        <label>
          <span>Username</span>
          <input type="text" name="username" autoComplete="username" required />
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" autoComplete="current-password" required />
        </label>
        <p id="login-error" class="error" hidden></p>
        <button type="submit">Sign in</button>
      </form>
    </div>

    <div id="dashboard-view" class="screen" hidden>
      <header class="topbar">
        <div>
          <p class="eyebrow">ORCA REHAB</p>
          <h1>New Employee Submissions</h1>
        </div>
        <button id="logout-button" class="text-button">Sign out</button>
      </header>

      <main id="list-container" class="list-container">
        <p class="empty-state" id="empty-state" hidden>No submissions yet.</p>
        <table id="submissions-table" class="submissions-table" hidden>
          <thead>
            <tr>
              <th>Name</th>
              <th>Submitted</th>
              <th>QuickBooks</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="submissions-body"></tbody>
        </table>
      </main>
    </div>

    <div id="detail-overlay" class="overlay" hidden>
      <div class="detail-card">
        <button id="detail-close" class="text-button close-button">&times; Close</button>
        <div id="detail-content"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
